<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> </title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#060810; overflow:hidden; width:100vw; height:100vh; cursor:none; }
  canvas { position:fixed; top:0; left:0; width:100%; height:100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const PALETTES = {
  warm:  ['#f5d097','#e8a86a','#fde8b8','#e89050','#fff3d0','#f0c88a'],
  rose:  ['#e8a0b4','#d4708a','#fadadd','#c05878','#ffe8ee','#f0c0cc'],
  sky:   ['#8ec8e8','#6aaad0','#d0eef8','#4888b8','#e8f4fc','#b8dff0'],
  sage:  ['#a8c8a0','#80a878','#dcecd8','#5e9858','#eef5ec','#c0d8b8'],
  dusk:  ['#b898d0','#9068b8','#e8d8f4','#6840a0','#f4eef8','#d0b8e8'],
  ember: ['#d4705a','#b84838','#f8ccc0','#902830','#fce8e4','#e8a090'],
  pearl: ['#e8e0d8','#d0c8be','#f8f6f4','#b0a898','#ffffff','#f0ece8'],
};
const PAL_KEYS = Object.keys(PALETTES);
function randPal(){ return PALETTES[PAL_KEYS[Math.floor(Math.random()*PAL_KEYS.length)]]; }
function randFrom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function hexRgb(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
function lerpRgb(a,b,t){ return a.map((v,i)=>Math.round(v+(b[i]-v)*t)); }
function toRgba([r,g,b],a){ return `rgba(${r},${g},${b},${Math.min(1,Math.max(0,a)).toFixed(3)})`; }

function makeBeadShape(type){
  const pts = [];
  if(type === 'ring'){
    const n = 8;
    for(let i=0;i<n;i++){
      const a = (i/n)*Math.PI*2;
      pts.push([Math.cos(a), Math.sin(a)]);
    }
    pts.push([0,0]);
  } else if(type === 'daisy'){
    for(let i=0;i<6;i++){
      const a=(i/6)*Math.PI*2;
      pts.push([Math.cos(a)*1.0, Math.sin(a)*1.0]);
      pts.push([Math.cos(a)*0.55, Math.sin(a)*0.55]);
    }
    pts.push([0,0]);
  } else if(type === 'cross'){
    [[1,0],[-1,0],[0,1],[0,-1]].forEach(([x,y])=>{
      pts.push([x*1.0, y*1.0]);
      pts.push([x*0.5, y*0.5]);
    });
    pts.push([0,0]);
  } else {
    for(let i=0;i<6;i++){
      const a=(i/6)*Math.PI*2;
      pts.push([Math.cos(a)*1.0, Math.sin(a)*1.0]);
      pts.push([Math.cos(a+Math.PI/6)*0.5, Math.sin(a+Math.PI/6)*0.5]);
    }
    pts.push([0,0]);
  }
  return pts;
}
const BEAD_TYPES = ['ring','daisy','cross','dense'];

function drawDot(x, y, r, rgb, a){
  if(a <= 0.005 || r <= 0) return;
  const [R,G,B] = rgb;
  const gr = ctx.createRadialGradient(x,y,0, x,y, r*2.2);
  gr.addColorStop(0,   `rgba(${R},${G},${B},${(a*.95).toFixed(3)})`);
  gr.addColorStop(0.40,`rgba(${R},${G},${B},${(a*.22).toFixed(3)})`);
  gr.addColorStop(1,   `rgba(${R},${G},${B},0)`);
  ctx.beginPath(); ctx.arc(x,y,r*2.2,0,Math.PI*2);
  ctx.fillStyle = gr; ctx.fill();
  ctx.beginPath(); ctx.arc(x,y,r*.7,0,Math.PI*2);
  ctx.fillStyle = `rgba(255,255,255,${(a*.90).toFixed(3)})`; ctx.fill();
}

const DRIFT_N = 160;
let drifters = [];

function makeDrift(){
  const pal = randPal();
  return {
    x: Math.random()*W, y: Math.random()*H,
    vx:(Math.random()-.5)*.22, vy:-(0.06+Math.random()*.15),
    r: 0.45 + Math.random()*.75,
    rgb: hexRgb(randFrom(pal)), rgb2: hexRgb(randFrom(pal)),
    colorT: Math.random(), colorDir: Math.random()<.5?1:-1,
    colorSpeed: 0.003+Math.random()*.005,
    alpha: 0.18+Math.random()*.32,
    phase: Math.random()*Math.PI*2,
    freq:  0.3+Math.random()*.9,
    wobble:(Math.random()-.5)*.011,
    age:0, life:320+Math.floor(Math.random()*480),
  };
}
function initDrift(){
  drifters=[];
  for(let i=0;i<DRIFT_N;i++){
    const d=makeDrift(); d.age=Math.floor(Math.random()*d.life); drifters.push(d);
  }
}

function tickDrift(){
  for(let i=0;i<drifters.length;i++){
    const p=drifters[i]; p.age++;
    p.vx+=Math.sin(t*.011*p.freq+p.phase)*p.wobble;
    p.vx*=.99; p.vy*=.995;
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<-5) p.x=W+5; if(p.x>W+5) p.x=-5;
    if(p.y<-5){ p.y=H+5; p.x=Math.random()*W; }
    p.colorT=Math.max(0,Math.min(1,p.colorT+p.colorDir*p.colorSpeed));
    if(p.colorT>=1){p.colorDir=-1;p.rgb2=hexRgb(randFrom(randPal()));}
    if(p.colorT<=0){p.colorDir= 1;p.rgb =hexRgb(randFrom(randPal()));}
    const rgb=lerpRgb(p.rgb,p.rgb2,p.colorT);
    const lf=p.age/p.life;
    const env=lf<.12?lf/.12:lf>.82?(1-lf)/.18:1;
    const flick=.55+.45*Math.sin(t*.05*p.freq+p.phase);
    drawDot(p.x,p.y,p.r,rgb,p.alpha*env*flick);
    if(p.age>=p.life) drifters[i]=makeDrift();
  }
}

const TOTAL_FRAMES   = 240;
const HOLD_FRAMES    = 200;
const FADEOUT_FRAMES = 120;

function makeBracelet(glowing=false){
  const nBeads    = 6 + Math.round(Math.random());
  const ringR     = glowing ? Math.min(W, H) * 0.20 : Math.min(W, H) * 0.32;
  const cx        = W * 0.5;
  const cy        = H * 0.5;
  const startAngle = -Math.PI * 0.5;
  const arcGap   = (2 * Math.PI * ringR) / nBeads;
  const maxBeadR = arcGap * 0.30;
  const baseBeadR = glowing
    ? Math.min(maxBeadR, 13 + Math.random()*5)
    : Math.min(maxBeadR, 10 + Math.random()*4);
  const SHAPES_AVAILABLE = ['ring','daisy','cross','dense'];
  const beads = [];
  for(let bi = 0; bi < nBeads; bi++){
    const angle = startAngle + (bi / nBeads) * Math.PI * 2;
    const bcx   = cx + Math.cos(angle) * ringR;
    const bcy   = cy + Math.sin(angle) * ringR;
    const beadPal   = randPal();
    const petalCol  = randFrom(beadPal);
    const centreCol = randFrom(beadPal);
    const beadType  = SHAPES_AVAILABLE[bi % SHAPES_AVAILABLE.length];
    const shape     = makeBeadShape(beadType);
    const beadR     = baseBeadR;
    const beadStart = Math.floor((bi / nBeads) * TOTAL_FRAMES * 0.85);
    const dots = shape.map(([dx, dy], di) => ({
      x:  bcx + (Math.random() - 0.5) * 80,
      y:  bcy + (Math.random() - 0.5) * 80,
      tx: bcx + dx * beadR,
      ty: bcy + dy * beadR,
      vx: 0, vy: 0,
      rgb: di === shape.length - 1 ? hexRgb(centreCol) : hexRgb(petalCol),
      r:   1.0 + Math.random() * 0.7,
      delay: beadStart + di * (5 + Math.floor(Math.random() * 5)),
    }));
    beads.push({ cx: bcx, cy: bcy, dots });
  }
  return {
    type: 'bracelet', cx, cy, ringR, beads,
    age: 0, alpha: 0, phase: 'in', glowing,
    flickPhase: Math.random() * Math.PI * 2,
  };
}

function makeBurst(){
  const pal = randPal();
  const col1 = randFrom(pal), col2 = randFrom(pal);
  const cx = W*.12 + Math.random()*W*.76;
  const cy = H*.10 + Math.random()*H*.55;
  const style = randFrom(['radiate','radiate','scatter','streak','streak','tiny','tiny']);
  let n, spd, life, dotR;
  if(style==='radiate'){ n=12+Math.floor(Math.random()*8);  spd=1.0+Math.random()*1.2; life=100+Math.floor(Math.random()*60);  dotR=0.9+Math.random()*.7; }
  if(style==='scatter'){ n=16+Math.floor(Math.random()*12); spd=0.6+Math.random()*1.0; life=90+Math.floor(Math.random()*60);   dotR=0.7+Math.random()*.6; }
  if(style==='streak') { n=6 +Math.floor(Math.random()*5);  spd=1.8+Math.random()*2.2; life=80+Math.floor(Math.random()*50);   dotR=0.8+Math.random()*.5; }
  if(style==='tiny')   { n=7 +Math.floor(Math.random()*5);  spd=0.3+Math.random()*.5;  life=130+Math.floor(Math.random()*80);  dotR=0.5+Math.random()*.4; }
  const dots=[];
  for(let i=0;i<n;i++){
    let ax, ay;
    if(style==='radiate'){ ax=(i/n)*Math.PI*2; ay=0; }
    else { ax=Math.random()*Math.PI*2; ay=(Math.random()-.5)*.6; }
    const s=spd*(0.55+Math.random()*.9);
    const trailLen = style==='streak' ? 24+Math.floor(Math.random()*18)
                   : style==='radiate'? 8+Math.floor(Math.random()*8)
                   : 5+Math.floor(Math.random()*6);
    dots.push({
      x:cx,y:cy,
      vx:Math.cos(ax)*s,
      vy:Math.sin(ax)*s+(style==='radiate'?0:Math.sin(ay)*s*.4),
      rgb:  hexRgb(i%2===0?col1:col2),
      rgb2: hexRgb(randFrom(pal)),
      r: dotR, trail:[], trailLen,
    });
  }
  return { type:'burst', style, cx,cy, dots, age:0, life, alpha:0 };
}

let scene = [];
let t = 0;
let bracelets = 0, bursts = 0;
const MAX_BRACELETS=2, MAX_BURSTS=3;

function init(){
  initDrift();
  scene=[]; bracelets=0; bursts=0;
}

function draw(){
  requestAnimationFrame(draw);
  t++;
  ctx.fillStyle='rgba(6,8,16,0.18)';
  ctx.fillRect(0,0,W,H);
  if(t%40===0 && bracelets<MAX_BRACELETS){
    const isGlow = scene.filter(s=>s.type==='bracelet').length === 1;
    scene.push(makeBracelet(isGlow)); bracelets++;
  }
  if(t%55===0 && bursts<MAX_BURSTS){ scene.push(makeBurst()); bursts++; }
  tickDrift();
  const dead=[];
  for(let i=0;i<scene.length;i++){
    const p=scene[i];
    p.age++;
    if(p.type==='bracelet'){
      const flick=.75+.25*Math.sin(t*.038+p.flickPhase);
      if(p.phase==='in'){
        p.alpha=Math.min(1,p.alpha+.018);
        if(p.age>=TOTAL_FRAMES) p.phase='hold';
      } else if(p.phase==='hold'){
        if(p.age>=TOTAL_FRAMES+HOLD_FRAMES) p.phase='out';
      } else {
        p.alpha=Math.max(0,p.alpha-.012);
        if(p.alpha<=0){ dead.push(i); bracelets--; continue; }
      }
      for(const b of p.beads){
        for(const d of b.dots){
          if(p.age < d.delay) continue;
          d.vx += (d.tx - d.x) * 0.12; d.vy += (d.ty - d.y) * 0.12;
          d.vx *= 0.68; d.vy *= 0.68;
          d.x += d.vx; d.y += d.vy;
          const dotA = p.glowing ? Math.min(1, p.alpha * flick * 1.8) : p.alpha * flick;
          drawDot(d.x, d.y, d.r, d.rgb, dotA);
        }
      }
      if(p.alpha > 0.05){
        ctx.beginPath();
        ctx.arc(p.cx, p.cy, p.ringR, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(255,255,255,${(p.alpha * 0.05 * flick).toFixed(3)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    } else if(p.type==='burst'){
      p.alpha = p.age<10 ? p.age/10 : Math.max(0,1-(p.age-10)/(p.life-10));
      if(p.alpha<=0 && p.age>10){ dead.push(i); bursts--; continue; }
      for(const d of p.dots){
        d.vx*=0.974; d.vy*=0.974;
        d.vy+=0.010;
        d.x+=d.vx; d.y+=d.vy;
        d.trail.push([d.x,d.y]);
        if(d.trail.length>d.trailLen) d.trail.shift();
        for(let k=0;k<d.trail.length;k++){
          const tf=k/d.trail.length;
          const ta = p.style==='streak' ? tf*.7 : tf*.35;
          drawDot(d.trail[k][0],d.trail[k][1], d.r*(0.4+tf*.6), d.rgb, p.alpha*ta);
        }
        drawDot(d.x,d.y,d.r,d.rgb,p.alpha*.95);
      }
    }
  }
  for(let i=dead.length-1;i>=0;i--) scene.splice(dead[i],1);
}

init();
draw();
</script>
</body>
</html>
