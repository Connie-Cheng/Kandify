<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0c; overflow:hidden; width:100vw; height:100vh; cursor:none; }
  canvas { position:fixed; top:0; left:0; width:100%; height:100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', () => { resize(); initScene(); });
canvas.addEventListener('click', spawnClickShimmers);
canvas.addEventListener('touchstart', spawnClickShimmers, {passive:true});

const LAYERS = [
  { scale:0.45, alpha:0.35, sat:0.30, glow:false, speed:0.0  },
  { scale:0.70, alpha:0.55, sat:0.65, glow:false, speed:0.0  },
  { scale:1.00, alpha:0.85, sat:1.00, glow:true,  speed:0.0  },
];

const VIVID = [
  [255, 38, 50],  [255,100, 20],  [255,210, 20],  [255,230,100],
  [ 50,200, 80],  [ 20,180,200],  [ 40,130,255],  [180, 60,255],
  [255, 60,180],  [255,160,200],  [255,255,255],  [220,220,255],
  [255,200, 50],  [200,255,200],  [ 80,255,220],  [255,120,120],
];

function randVivid(){ return VIVID[Math.floor(Math.random()*VIVID.length)]; }

function desaturate([r,g,b], amount){
  const grey = r*0.299 + g*0.587 + b*0.114;
  return [
    Math.round(r + (grey-r)*amount),
    Math.round(g + (grey-g)*amount),
    Math.round(b + (grey-b)*amount),
  ];
}

function centerLight(x, y){
  const dx = (x - W*0.5) / (W*0.5);
  const dy = (y - H*0.5) / (H*0.5);
  const d  = Math.sqrt(dx*dx + dy*dy);
  return Math.max(0.22, 1.20 - d*0.95);
}

function makePiece(layerIdx, settled){
  const L     = LAYERS[layerIdx];
  const vivid = randVivid();
  const desat = 1.0 - L.sat;
  const rgb   = desaturate(vivid, desat);
  const metallic = Math.random() < 0.18;
  const rgb2 = metallic ? [255,255,255] : desaturate(randVivid(), desat);

  const type = weightedRand({
    rect:   0.32, square: 0.16, ribbon: 0.18,
    tiny:   0.22, circle: 0.08, curl:   0.04,
  });

  const s  = L.scale;
  let w, h, r=0;
  if(type==='rect')  { w=(5+Math.random()*10)*s; h=(3+Math.random()*5)*s; }
  if(type==='square'){ w=(4+Math.random()*7)*s;  h=w; }
  if(type==='ribbon'){ w=(1.5+Math.random())*s;  h=(10+Math.random()*16)*s; }
  if(type==='tiny')  { w=(1.5+Math.random()*2.5)*s; h=w; }
  if(type==='circle'){ r=(2+Math.random()*3)*s;  w=r; h=r; }
  if(type==='curl')  { w=(1+Math.random())*s;    h=(8+Math.random()*12)*s; }

  let x, y;
  if(settled){
    const cx = W*0.5 + (Math.random()-0.5)*W*(0.6+Math.random()*0.5);
    const cy = H*0.5 + (Math.random()-0.5)*H*(0.6+Math.random()*0.5);
    x = cx; y = cy;
  } else {
    x = Math.random()*W;
    y = -20 - Math.random()*H*0.3;
  }

  const rot  = Math.random()*Math.PI*2;
  const rotV = settled ? (Math.random()-0.5)*0.004 : (Math.random()-0.5)*0.14;
  const speedRoll = Math.pow(Math.random(), 0.6);
  const radialSpeed = settled
    ? (0.04 + speedRoll * 0.55) * (layerIdx === 0 ? 0.45 : layerIdx === 1 ? 0.80 : 1.4)
    : 0;
  const radialAngle = settled ? Math.atan2(y - H*0.5, x - W*0.5) : 0;

  return {
    type, layerIdx, x, y, w, h, r, rot, rotV,
    vx: settled ? Math.cos(radialAngle)*radialSpeed : (Math.random()-0.5)*1.2,
    vy: settled ? Math.sin(radialAngle)*radialSpeed : 0.8+Math.random()*2.0,
    radial: settled, radialSpeed,
    gravity: settled ? 0 : 0.025+Math.random()*0.02,
    drag:    settled ? 1.0 : 0.992+Math.random()*0.006,
    sway: (Math.random()-0.5)*0.05,
    swayFreq:  0.2+Math.random()*0.7,
    swayPhase: Math.random()*Math.PI*2,
    rgb, rgb2, metallic, alpha: L.alpha, glow: L.glow,
    flickPhase: Math.random()*Math.PI*2,
    flickFreq:  0.2+Math.random()*0.6,
    settled, age: settled ? Math.floor(Math.random()*999) : 0, desat,
  };
}

function weightedRand(spec){
  let sum=0, r=Math.random();
  for(const k in spec){ sum+=spec[k]; if(r<=sum) return k; }
  return Object.keys(spec)[0];
}

function makeShimmer(){
  const rgb    = randVivid();
  const isBig  = Math.random() < 0.15;
  const isStar = Math.random() < 0.12;
  const startAngle = Math.random()*Math.PI*2;
  const startR     = Math.random()*90;
  const x = W*0.5 + Math.cos(startAngle)*startR;
  const y = H*0.5 + Math.sin(startAngle)*startR;
  const outAngle   = Math.atan2(y-H*0.5, x-W*0.5);
  const speedRoll  = Math.pow(Math.random(), 0.5);
  const radialSpeed= isBig ? 0.06+speedRoll*0.22 : 0.05+speedRoll*0.65;
  return {
    type:'shimmer', x, y,
    vx: Math.cos(outAngle)*radialSpeed,
    vy: Math.sin(outAngle)*radialSpeed,
    radialSpeed, radial: true, settled: true, layerIdx: 2,
    rgb, r: isBig ? 3+Math.random()*6 : 0.6+Math.random()*1.6,
    isBig, isStar,
    alpha: isBig ? 0.18+Math.random()*0.28 : 0.55+Math.random()*0.45,
    flickPhase:  Math.random()*Math.PI*2,
    flickFreq:   isBig ? 0.2+Math.random()*0.4 : 0.5+Math.random()*1.8,
    flickAmp:    isBig ? 0.35 : 0.50,
    sway:        (Math.random()-0.5)*0.04,
    swayFreq:    0.2+Math.random()*0.6,
    swayPhase:   Math.random()*Math.PI*2,
    age: Math.floor(Math.random()*999), drag: 1.0,
  };
}

let pieces = [];
const SETTLED_COUNT = 680;

function initScene(){
  pieces = [];
  for(let li=0; li<3; li++){
    const n = li===0 ? SETTLED_COUNT*0.45 : li===1 ? SETTLED_COUNT*0.35 : SETTLED_COUNT*0.20;
    for(let i=0;i<n;i++) pieces.push(makePiece(li, true));
  }
  for(let i=0;i<120;i++) pieces.push(makeShimmer());
}

function drawPiece(p, light){
  const flick = p.settled
    ? 0.9 + 0.10*Math.sin(t*0.02*p.flickFreq+p.flickPhase)
    : 0.75 + 0.25*Math.sin(t*0.06*p.flickFreq+p.flickPhase);
  let [R,G,B] = p.rgb;
  if(p.metallic){
    const m = Math.max(0, flick-0.85)*6;
    [R,G,B] = [Math.round(R+(p.rgb2[0]-R)*m),Math.round(G+(p.rgb2[1]-G)*m),Math.round(B+(p.rgb2[2]-B)*m)];
  }
  const a = Math.min(1, p.alpha * flick * light);
  if(a < 0.015) return;
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rot);
  ctx.globalAlpha = a;
  if(p.type==='circle'){
    if(p.glow){
      const gr=ctx.createRadialGradient(0,0,0,0,0,p.r*3);
      gr.addColorStop(0,`rgba(${R},${G},${B},0.9)`);
      gr.addColorStop(0.4,`rgba(${R},${G},${B},0.4)`);
      gr.addColorStop(1,`rgba(${R},${G},${B},0)`);
      ctx.beginPath(); ctx.arc(0,0,p.r*3,0,Math.PI*2);
      ctx.fillStyle=gr; ctx.fill();
    }
    ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgb(${R},${G},${B})`; ctx.fill();
    if(p.metallic){
      ctx.beginPath(); ctx.arc(-p.r*0.25,-p.r*0.25,p.r*0.35,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.fill();
    }
  } else if(p.type==='tiny'){
    ctx.fillStyle=`rgb(${R},${G},${B})`;
    ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
  } else if(p.type==='ribbon'){
    const gr=ctx.createLinearGradient(0,-p.h/2,0,p.h/2);
    gr.addColorStop(0,`rgba(${R},${G},${B},0.1)`);
    gr.addColorStop(0.45,`rgba(${R},${G},${B},1.0)`);
    gr.addColorStop(0.55,`rgba(${R},${G},${B},1.0)`);
    gr.addColorStop(1,`rgba(${R},${G},${B},0.1)`);
    ctx.fillStyle=gr;
    ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
  } else if(p.type==='rect' || p.type==='square'){
    ctx.fillStyle=`rgb(${R},${G},${B})`;
    ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    if(p.metallic){
      const hg=ctx.createLinearGradient(-p.w/2,-p.h/2,p.w/2,-p.h/2);
      hg.addColorStop(0,'rgba(255,255,255,0.0)');
      hg.addColorStop(0.5,'rgba(255,255,255,0.45)');
      hg.addColorStop(1,'rgba(255,255,255,0.0)');
      ctx.fillStyle=hg;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    } else {
      ctx.fillStyle='rgba(255,255,255,0.12)';
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h*0.2);
    }
  } else if(p.type==='curl'){
    ctx.beginPath();
    ctx.arc(0,0,p.h/3, 0.1, Math.PI*1.2);
    ctx.strokeStyle=`rgb(${R},${G},${B})`;
    ctx.lineWidth=p.w; ctx.lineCap='round';
    ctx.stroke();
  }
  ctx.restore();
}

function drawShimmer(p, light){
  const flick = (1-p.flickAmp) + p.flickAmp*Math.sin(t*0.055*p.flickFreq+p.flickPhase);
  const a     = Math.min(1, p.alpha * flick * light);
  if(a < 0.01) return;
  const [R,G,B] = p.rgb;
  if(p.isBig){
    const gr = ctx.createRadialGradient(p.x,p.y,0, p.x,p.y, p.r*4.5);
    gr.addColorStop(0,   `rgba(${R},${G},${B},${(a*0.55).toFixed(3)})`);
    gr.addColorStop(0.25,`rgba(${R},${G},${B},${(a*0.28).toFixed(3)})`);
    gr.addColorStop(0.65,`rgba(${R},${G},${B},${(a*0.07).toFixed(3)})`);
    gr.addColorStop(1,   `rgba(${R},${G},${B},0)`);
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*4.5,0,Math.PI*2);
    ctx.fillStyle=gr; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*0.7,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${(a*0.5).toFixed(3)})`; ctx.fill();
  } else if(p.isStar){
    const len = p.r*5;
    ctx.save(); ctx.translate(p.x,p.y);
    for(let arm=0;arm<4;arm++){
      const angle = arm*Math.PI*0.5;
      const x2=Math.cos(angle)*len, y2=Math.sin(angle)*len;
      const gr=ctx.createLinearGradient(0,0,x2,y2);
      gr.addColorStop(0,   `rgba(255,255,255,${(a*0.9).toFixed(3)})`);
      gr.addColorStop(0.4, `rgba(${R},${G},${B},${(a*0.5).toFixed(3)})`);
      gr.addColorStop(1,   `rgba(${R},${G},${B},0)`);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(x2,y2);
      ctx.strokeStyle=gr; ctx.lineWidth=1.2; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(0,0,p.r*0.7,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${(a*0.95).toFixed(3)})`; ctx.fill();
    ctx.restore();
  } else {
    const gr=ctx.createRadialGradient(p.x,p.y,0, p.x,p.y, p.r*3.8);
    gr.addColorStop(0,   `rgba(${R},${G},${B},${a.toFixed(3)})`);
    gr.addColorStop(0.3, `rgba(${R},${G},${B},${(a*0.55).toFixed(3)})`);
    gr.addColorStop(0.7, `rgba(${R},${G},${B},${(a*0.12).toFixed(3)})`);
    gr.addColorStop(1,   `rgba(${R},${G},${B},0)`);
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*3.8,0,Math.PI*2);
    ctx.fillStyle=gr; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*0.5,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${(a*0.92).toFixed(3)})`; ctx.fill();
  }
}

function drawVignette(){
  const vg = ctx.createRadialGradient(W/2,H/2,H*0.08, W/2,H/2,H*0.85);
  vg.addColorStop(0,   'rgba(0,0,0,0)');
  vg.addColorStop(0.55,'rgba(0,0,0,0.15)');
  vg.addColorStop(1,   'rgba(0,0,0,0.72)');
  ctx.fillStyle=vg;
  ctx.fillRect(0,0,W,H);
  const cg = ctx.createRadialGradient(W/2,H/2,0, W/2,H/2,H*0.38);
  cg.addColorStop(0,   'rgba(255,240,210,0.07)');
  cg.addColorStop(0.6, 'rgba(255,240,210,0.02)');
  cg.addColorStop(1,   'rgba(255,240,210,0)');
  ctx.fillStyle=cg;
  ctx.fillRect(0,0,W,H);
}

function spawnClickShimmers(){
  const n = 90 + Math.floor(Math.random()*40);
  for(let i=0;i<n;i++){
    const angle = Math.random()*Math.PI*2;
    const speedRoll = Math.pow(Math.random(), 0.4);
    const spd   = 0.3 + speedRoll * 3.2;
    const isStar = Math.random() < 0.25;
    const isBig  = Math.random() < 0.12;
    clickShimmers.push({
      x:  W*0.5 + (Math.random()-0.5)*30,
      y:  H*0.5 + (Math.random()-0.5)*30,
      vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
      drag: 0.96 + Math.random()*0.025,
      r:   isBig ? 3+Math.random()*5 : 0.7+Math.random()*1.8,
      isStar, isBig,
      alpha: 0.8+Math.random()*0.2,
      life:  60 + Math.floor(Math.random()*80),
      age:   0,
      flickPhase: Math.random()*Math.PI*2,
      flickFreq:  0.6+Math.random()*2.0,
    });
  }
}

function tickClickShimmers(){
  const dead=[];
  for(let i=0;i<clickShimmers.length;i++){
    const p=clickShimmers[i];
    p.age++;
    p.vx*=p.drag; p.vy*=p.drag;
    p.x+=p.vx; p.y+=p.vy;
    const lifeF = p.age/p.life;
    const env   = lifeF < 0.08 ? lifeF/0.08 : 1 - Math.pow((lifeF-0.08)/0.92, 0.6);
    const flick = 0.5+0.5*Math.sin(t*0.08*p.flickFreq+p.flickPhase);
    const a     = Math.max(0, p.alpha * env * flick);
    if(p.isStar){
      const len = p.r*6*(1-lifeF*0.4);
      ctx.save(); ctx.translate(p.x,p.y);
      for(let arm=0;arm<4;arm++){
        const ang=arm*Math.PI*0.5;
        const x2=Math.cos(ang)*len, y2=Math.sin(ang)*len;
        const gr=ctx.createLinearGradient(0,0,x2,y2);
        gr.addColorStop(0,   `rgba(255,255,255,${(a*0.95).toFixed(3)})`);
        gr.addColorStop(0.5, `rgba(220,240,255,${(a*0.5).toFixed(3)})`);
        gr.addColorStop(1,   `rgba(200,230,255,0)`);
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(x2,y2);
        ctx.strokeStyle=gr; ctx.lineWidth=1.3; ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(0,0,p.r*0.8,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${(a*0.98).toFixed(3)})`; ctx.fill();
      ctx.restore();
    } else if(p.isBig){
      const gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*5);
      gr.addColorStop(0,   `rgba(255,255,255,${(a*0.6).toFixed(3)})`);
      gr.addColorStop(0.3, `rgba(220,240,255,${(a*0.28).toFixed(3)})`);
      gr.addColorStop(1,   `rgba(200,230,255,0)`);
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*5,0,Math.PI*2);
      ctx.fillStyle=gr; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*0.6,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${(a*0.9).toFixed(3)})`; ctx.fill();
    } else {
      const gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*4);
      gr.addColorStop(0,   `rgba(255,255,255,${a.toFixed(3)})`);
      gr.addColorStop(0.4, `rgba(220,240,255,${(a*0.45).toFixed(3)})`);
      gr.addColorStop(1,   `rgba(200,230,255,0)`);
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*4,0,Math.PI*2);
      ctx.fillStyle=gr; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*0.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${(a*0.95).toFixed(3)})`; ctx.fill();
    }
    if(p.age>=p.life) dead.push(i);
  }
  for(let i=dead.length-1;i>=0;i--) clickShimmers.splice(dead[i],1);
}

function drawCassette(){
  const cx = W * 0.5;
  const cy = H * 0.5;
  const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 180);
  glow.addColorStop(0,   'rgba(255,255,255,0.10)');
  glow.addColorStop(0.4, 'rgba(255,255,255,0.05)');
  glow.addColorStop(1,   'rgba(255,255,255,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(cx-180, cy-180, 360, 360);
  ctx.save();
  ctx.translate(cx, cy);
  const bw = 130, bh = 80, br = 8;
  const bx = -bw/2, by = -bh/2;
  ctx.shadowColor = 'rgba(255,255,255,0.6)';
  ctx.shadowBlur  = 28;
  roundRect(ctx, bx, by, bw, bh, br);
  ctx.fillStyle = 'rgba(245,245,250,0.18)';
  ctx.fill();
  roundRect(ctx, bx, by, bw, bh, br);
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.shadowBlur = 0;
  const wx = -42, wy = -28, ww = 84, wh = 36, wbr = 4;
  roundRect(ctx, wx, wy, ww, wh, wbr);
  ctx.strokeStyle = 'rgba(255,255,255,0.40)';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fill();
  const reelR = 11;
  const reelOffX = 22;
  const reelCY = wy + wh*0.50;
  for(let s = -1; s <= 1; s += 2){
    const rx = s * reelOffX;
    const ry = reelCY;
    ctx.beginPath(); ctx.arc(rx, ry, reelR, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.45)';
    ctx.lineWidth = 1.0;
    ctx.stroke();
    ctx.beginPath(); ctx.arc(rx, ry, reelR*0.38, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.30)';
    ctx.fill();
    for(let i=0;i<3;i++){
      const a = (i/3)*Math.PI*2 + (t*0.004);
      ctx.beginPath();
      ctx.moveTo(rx + Math.cos(a)*reelR*0.38, ry + Math.sin(a)*reelR*0.38);
      ctx.lineTo(rx + Math.cos(a)*reelR*0.85, ry + Math.sin(a)*reelR*0.85);
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1.0;
      ctx.stroke();
    }
  }
  ctx.beginPath();
  ctx.moveTo(-reelOffX + reelR*0.9, reelCY);
  ctx.quadraticCurveTo(0, reelCY + 7, reelOffX - reelR*0.9, reelCY);
  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  const lx = bx+12, ly = by+bh*0.52, lw = bw-24, lh = bh*0.34;
  roundRect(ctx, lx, ly, lw, lh, 3);
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.20)';
  ctx.lineWidth = 0.8;
  ctx.stroke();
  const screwPositions = [
    [bx+12, by+12], [bx+bw-12, by+12],
    [bx+12, by+bh-12], [bx+bw-12, by+bh-12]
  ];
  for(const [sx,sy] of screwPositions){
    ctx.beginPath(); ctx.arc(sx, sy, 3.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.20)'; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 0.8; ctx.stroke();
  }
  if(!drawCassette._edgeDots){
    drawCassette._edgeDots = [];
    const N = 160;
    for(let i=0;i<N;i++){
      const side = Math.floor(Math.random()*4);
      let ex, ey;
      if(side===0){ ex=bx+Math.random()*bw; ey=by; }
      else if(side===1){ ex=bx+bw; ey=by+Math.random()*bh; }
      else if(side===2){ ex=bx+Math.random()*bw; ey=by+bh; }
      else            { ex=bx;    ey=by+Math.random()*bh; }
      drawCassette._edgeDots.push({
        ex: ex + (Math.random()-0.5)*6,
        ey: ey + (Math.random()-0.5)*6,
        r:  0.6+Math.random()*1.4,
        phase: Math.random()*Math.PI*2,
        freq:  0.4+Math.random()*1.2,
        alpha: 0.15+Math.random()*0.40,
      });
    }
  }
  for(const d of drawCassette._edgeDots){
    const flick = 0.4+0.6*Math.sin(t*0.05*d.freq+d.phase);
    const a = d.alpha*flick;
    ctx.beginPath(); ctx.arc(d.ex, d.ey, d.r, 0, Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${a.toFixed(3)})`; ctx.fill();
  }
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

let t = 0;
let clickShimmers = [];

function draw(){
  requestAnimationFrame(draw);
  t++;
  ctx.fillStyle='rgba(10,10,12,0.55)';
  ctx.fillRect(0,0,W,H);
  const settled = pieces.filter(p=>p.settled).sort((a,b)=>a.layerIdx-b.layerIdx);
  for(const p of settled){
    if(p.radial){
      p.x += p.vx; p.y += p.vy; p.rot += p.rotV;
      const perp = Math.atan2(p.vy, p.vx) + Math.PI*0.5;
      p.x += Math.cos(perp) * Math.sin(t*0.01*p.swayFreq+p.swayPhase) * 0.18;
      p.y += Math.sin(perp) * Math.sin(t*0.01*p.swayFreq+p.swayPhase) * 0.18;
      const margin = 60;
      if(p.x < -margin || p.x > W+margin || p.y < -margin || p.y > H+margin){
        const newAngle = Math.random()*Math.PI*2;
        const startR   = Math.random()*80;
        p.x  = W*0.5 + Math.cos(newAngle)*startR;
        p.y  = H*0.5 + Math.sin(newAngle)*startR;
        const outAngle = Math.atan2(p.y-H*0.5, p.x-W*0.5);
        p.vx = Math.cos(outAngle)*p.radialSpeed;
        p.vy = Math.sin(outAngle)*p.radialSpeed;
        p.alpha = 0;
      }
      const targetAlpha = LAYERS[p.layerIdx].alpha;
      if(p.alpha < targetAlpha) p.alpha = Math.min(targetAlpha, p.alpha + 0.008);
    }
    const lmod = centerLight(p.x, p.y);
    if(p.type==='shimmer') drawShimmer(p, lmod);
    else drawPiece(p, lmod);
  }
  drawCassette();
  tickClickShimmers();
  drawVignette();
}

initScene();
draw();
</script>
